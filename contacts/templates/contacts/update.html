
{% extends 'contacts/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h4>Update {{ contact.name }}</h4>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Update Contact</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
